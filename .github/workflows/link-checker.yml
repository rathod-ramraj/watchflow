name: Link Checker

on:
  schedule:
    - cron: '23 */12 * * *'
  workflow_dispatch:

env:
  DISCORD_WEBHOOK: ${{ secrets.SITE_VALIDATOR_WEBHOOK }}

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check links
        id: check
        run: |
          node .github/scripts/check-links.js

      - name: Attempt automatic link updates
        if: always()
        run: |
          if [ -f broken-links.json ]; then
            node .github/scripts/update-links.js
          fi

      - name: Commit link updates
        if: always()
        id: commit
        run: |
          if [ -f link-updates.json ]; then
            git config user.name "rathod-ramraj"
            git config user.email "diamondstar2200@gmail.com"
            git add public/Region-Links/*.json public/links.json 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "No staged changes — skipping commit."
            else
              git commit -m "bot: auto-update broken links"
              git pull --rebase origin ${{ github.ref_name }}
              git push origin HEAD:${{ github.ref_name }}
              echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Upload link updates artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-updates
          path: link-updates.json
          retention-days: 30

      - name: Send Discord notification
        if: always()
        env:
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          if [ -f broken-links.json ]; then
            node .github/scripts/send-discord-notification.js
          fi

      - name: Notify Discord on workflow crash
        if: failure()
        run: |
          if [ ! -f broken-links.json ]; then
            node -e "
              const https = require('https');
              const url = new URL(process.env.DISCORD_WEBHOOK || 'https://discord.com/api/webhooks/1521474273259159666/EsBHkwWtGyo9KIGt0Gy0dJYLPk1ixxjWMgh_t1bRYSrmJkox3vglks8kJ54CLrxm3Zna');
              const payload = JSON.stringify({
                content: '<@1343627759997554708>\n🚨 **Link Checker Crashed**\nThe workflow failed before producing a broken-links report. Check the GitHub Actions logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              });
              const req = https.request({
                hostname: url.hostname,
                path: url.pathname + url.search,
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) }
              }, res => { res.on('data', () => {}); res.on('end', () => process.exit(res.statusCode < 300 ? 0 : 1)); });
              req.on('error', e => { console.error(e); process.exit(1); });
              req.write(payload); req.end();
            "
          fi

      - name: Upload broken links artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broken-links
          path: broken-links.json
          retention-days: 30
